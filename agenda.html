<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda IWD 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue-primary:  #0334AB;
            --blue-dark:     #021d6e;
            --blue-card:     #0a3bbf;
            --blue-service:  #0b2fa3;
            --blue-accent:   #0847d6;
            --green-accent:  #1CE9B6;
            --green-light:   #7af0d4;
            --white:         #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html {
            height: auto;
            background-color: var(--blue-primary);
        }

        body {
            height: auto;
            background-color: var(--blue-primary);
            font-family: 'Outfit', sans-serif;
            color: var(--white);
            overflow-x: hidden;
            -webkit-text-size-adjust: 100%;
        }

        .agenda-page {
            background-color: var(--blue-primary);
            position: relative;
            padding: 2rem 1.5rem 3rem;
        }

        .px-block {
            position: absolute;
            background-color: var(--green-accent);
            border-radius: 3px;
            opacity: 0.12;
            pointer-events: none;
        }

        .agenda-inner {
            max-width: 1100px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* ══════════════════════════════════════════════
        SESSIONIZE — selectores reales del HTML
        Basados en .sz-cssgrid (estructura real)
        ══════════════════════════════════════════════ */

        /* Contenedor raíz */
        .sz-cssgrid {
            background: transparent !important;
            font-family: 'Outfit', sans-serif !important;
            color: var(--white) !important;
            width: 100% !important;
        }

        /* Título del día (Sat, 4/25/2026) */
        .sz-cssgrid h2 {
            font-family: 'Outfit', sans-serif !important;
            font-weight: 800 !important;
            font-size: 1.4rem !important;
            color: var(--white) !important;
            text-align: center !important;
            padding: 0.25rem 0 1.5rem !important;
            background: transparent !important;
            letter-spacing: 0.04em !important;
            text-transform: uppercase !important;
        }

        /* Headers de sala (columnas) */
        .sz-cssgrid__track-label {
            background-color: var(--blue-dark) !important;
            color: var(--green-accent) !important;
            font-family: 'Outfit', sans-serif !important;
            font-weight: 700 !important;
            font-size: 0.72rem !important;
            letter-spacing: 0.1em !important;
            text-transform: uppercase !important;
            border: 1px solid rgba(28,233,182,0.3) !important;
            border-radius: 6px !important;
            padding: 0.7rem 0.8rem !important;
            text-align: center !important;
        }

        /* Etiquetas de hora */
        .sz-cssgrid__time-label {
            color: var(--green-accent) !important;
            font-family: 'Outfit', sans-serif !important;
            font-weight: 700 !important;
            font-size: 0.8rem !important;
            background: transparent !important;
        }

        /* ── CARD normal — VERDE con texto AZUL OSCURO ── */
        .sz-cssgrid .sz-session__card {
            background: var(--green-accent) !important;
            background-color: var(--green-accent) !important;
            border-radius: 8px !important;
            border: none !important;
            border-left: 4px solid var(--blue-dark) !important;
            padding: 0.75rem 0.9rem !important;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15) !important;
            overflow: hidden !important;
            transition: background 0.18s ease !important;
        }

        .sz-cssgrid .sz-session__card:hover {
            background: var(--green-light) !important;
            background-color: var(--green-light) !important;
        }

        /* ── CARD de servicio (Registro, Almuerzo, Cierre) — AZUL OSCURO ── */
        .sz-cssgrid .sz-session--service .sz-session__card {
            background: var(--blue-dark) !important;
            background-color: var(--blue-dark) !important;
            border-left: 4px solid var(--green-accent) !important;
            text-align: center !important;
        }

        .sz-cssgrid .sz-session--service .sz-session__card:hover {
            background: var(--blue-primary) !important;
            background-color: var(--blue-primary) !important;
        }

        /* ── Badge de sala ── */
        .sz-cssgrid .sz-session__card .sz-session__room {
            display: inline-block !important;
            background-color: var(--blue-dark) !important;
            color: var(--green-accent) !important;
            font-family: 'Outfit', sans-serif !important;
            font-size: 0.58rem !important;
            font-weight: 700 !important;
            letter-spacing: 0.09em !important;
            text-transform: uppercase !important;
            border-radius: 3px !important;
            padding: 0.12rem 0.45rem !important;
            margin-bottom: 0.35rem !important;
            border: none !important;
            word-break: break-word !important;
            max-width: 100% !important;
        }

        .sz-cssgrid .sz-session--service .sz-session__card .sz-session__room {
            background-color: var(--green-accent) !important;
            color: var(--blue-dark) !important;
        }

        /* ── Hora ── */
        .sz-cssgrid .sz-session__card .sz-session__time {
            font-family: 'Outfit', sans-serif !important;
            font-size: 0.68rem !important;
            color: var(--blue-primary) !important;
            display: block !important;
            margin-bottom: 0.15rem !important;
            opacity: 1 !important;
            background: transparent !important;
        }

        .sz-cssgrid .sz-session--service .sz-session__card .sz-session__time {
            color: rgba(122, 240, 212, 0.8) !important;
        }

        /* ── Título ── */
        .sz-cssgrid .sz-session__card .sz-session__title,
        .sz-cssgrid .sz-session__card .sz-session__title a {
            font-family: 'Outfit', sans-serif !important;
            font-weight: 700 !important;
            font-size: 0.9rem !important;
            line-height: 1.4 !important;
            color: var(--blue-dark) !important;
            text-decoration: none !important;
            display: block !important;
            word-break: break-word !important;
            background: transparent !important;
        }

        .sz-cssgrid .sz-session--service .sz-session__card .sz-session__title,
        .sz-cssgrid .sz-session--service .sz-session__card .sz-session__title a {
            color: var(--green-accent) !important;
            font-size: 1rem !important;
        }

        /* ── Speakers ── */
        .sz-cssgrid .sz-session__card .sz-session__speakers,
        .sz-cssgrid .sz-session__card .sz-session__speakers li,
        .sz-cssgrid .sz-session__card .sz-session__speakers a {
            font-family: 'Outfit', sans-serif !important;
            font-size: 0.8rem !important;
            font-weight: 600 !important;
            color: var(--blue-primary) !important;
            text-decoration: none !important;
            list-style: none !important;
            margin-top: 0.3rem !important;
            background: transparent !important;
        }

        .sz-cssgrid .sz-session--service .sz-session__card .sz-session__speakers a {
            color: rgba(122, 240, 212, 0.8) !important;
        }

        /* ── Powered by ── */
        .sz-powered-by,
        a[href*="sessionize.com"] {
            color: rgba(122,240,212,0.4) !important;
            font-size: 0.65rem !important;
            text-align: center !important;
            display: block !important;
            margin-top: 2rem !important;
        }

        /* ══════════════════════════════════════════════
        MOBILE ≤ 768px
        ══════════════════════════════════════════════ */
        @media (max-width: 768px) {
            .agenda-page { padding: 1rem 0.75rem 2rem; }
            .px-block { display: none; }

            /* Convertir grid en lista vertical */
            .sz-cssgrid {
                display: block !important;
            }

            .sz-cssgrid__track-label {
                display: none !important;
            }

            .sz-cssgrid__time-label {
                display: block !important;
                padding: 0.7rem 0 0.3rem !important;
                font-size: 0.8rem !important;
                font-weight: 800 !important;
                letter-spacing: 0.1em !important;
                border-top: 1px solid rgba(28,233,182,0.2) !important;
                margin-top: 0.6rem !important;
                text-transform: uppercase !important;
                grid-column: unset !important;
                grid-row: unset !important;
            }

            .sz-cssgrid .sz-session {
                display: block !important;
                grid-column: unset !important;
                grid-row: unset !important;
                margin-bottom: 6px !important;
                width: 100% !important;
            }

            .sz-cssgrid .sz-session__card {
                border-radius: 10px !important;
                padding: 0.85rem 1rem !important;
                box-shadow: 0 3px 12px rgba(0,0,0,0.25) !important;
            }

            .sz-cssgrid .sz-session__card .sz-session__room {
                font-size: 0.6rem !important;
                padding: 0.15rem 0.5rem !important;
                margin-bottom: 0.4rem !important;
            }

            .sz-cssgrid .sz-session__card .sz-session__title,
            .sz-cssgrid .sz-session__card .sz-session__title a {
                font-size: 0.95rem !important;
                line-height: 1.35 !important;
            }

            .sz-cssgrid .sz-session__card .sz-session__speakers,
            .sz-cssgrid .sz-session__card .sz-session__speakers a {
                font-size: 0.82rem !important;
                margin-top: 0.35rem !important;
            }

            .sz-cssgrid h2 {
                font-size: 1.1rem !important;
                padding: 0 0 1rem !important;
            }
        }

        @media (max-width: 380px) {
            .sz-cssgrid .sz-session__card .sz-session__title,
            .sz-cssgrid .sz-session__card .sz-session__title a {
                font-size: 0.88rem !important;
            }
            .sz-cssgrid .sz-session__card {
                padding: 0.7rem 0.85rem !important;
            }
        }

        @media (min-width: 769px) and (max-width: 1024px) {
            .sz-cssgrid__track-label {
                font-size: 0.65rem !important;
                padding: 0.5rem 0.4rem !important;
            }
            .sz-cssgrid .sz-session__card .sz-session__title,
            .sz-cssgrid .sz-session__card .sz-session__title a {
                font-size: 0.82rem !important;
            }
            .sz-cssgrid .sz-session__card {
                padding: 0.6rem 0.7rem !important;
            }
        }
    </style>
</head>
<body>
<div class="agenda-page">

    <!-- Pixel deco desktop only -->
    <div class="px-block" style="top:14px;left:14px;width:32px;height:32px;"></div>
    <div class="px-block" style="top:52px;left:14px;width:22px;height:22px;"></div>
    <div class="px-block" style="top:14px;left:52px;width:32px;height:32px;"></div>
    <div class="px-block" style="top:52px;left:52px;width:14px;height:14px;opacity:0.06;"></div>
    <div class="px-block" style="top:14px;right:14px;width:22px;height:22px;"></div>
    <div class="px-block" style="top:42px;right:14px;width:32px;height:32px;"></div>
    <div class="px-block" style="top:14px;right:42px;width:22px;height:22px;"></div>
    <div class="px-block" style="bottom:14px;right:14px;width:32px;height:32px;"></div>
    <div class="px-block" style="bottom:14px;left:14px;width:22px;height:22px;"></div>

    <div class="agenda-inner">
        <script type="text/javascript"
                src="https://sessionize.com/api/v2/6gpc0cd3/view/GridSmart"></script>
    </div>

    <script>
        // CLAVE: medir el .agenda-page directamente (el contenedor real),
        // no el documento (que puede estar inflado por el iframe padre).
        function notifyHeight() {
            var page = document.querySelector('.agenda-page');
            if (!page) return;
            var h = page.offsetHeight;
            if (h > 100 && window.parent !== window) {
                window.parent.postMessage({ agendaHeight: h }, '*');
            }
        }

        // Sessionize inyecta su HTML de forma asíncrona — necesitamos
        // esperar hasta que termine. Lanzamos en múltiples momentos.
        window.addEventListener('load', function () {
            [300, 800, 1500, 2500, 4000, 6000].forEach(function(ms) {
                setTimeout(notifyHeight, ms);
            });
        });

        // MutationObserver para detectar cuando Sessionize termina de inyectar
        var settled = false;
        var mo = new MutationObserver(function() {
            clearTimeout(window._moTimer);
            window._moTimer = setTimeout(function() {
                notifyHeight();
                // Seguir midiendo un poco más por si carga imágenes/fonts
                setTimeout(notifyHeight, 500);
                setTimeout(notifyHeight, 1500);
            }, 200);
        });
        mo.observe(document.body, { childList: true, subtree: true });
    </script>
</div>
</body>
</html>
