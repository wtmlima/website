<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda IWD 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue-primary:  #0334AB;
            --blue-dark:     #021d6e;
            --blue-card:     #0a3bbf;
            --blue-service:  #0b2fa3;
            --blue-accent:   #0847d6;
            --green-accent:  #1CE9B6;
            --green-light:   #7af0d4;
            --green-dark:    #0bbf94;
            --white:         #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            background-color: var(--blue-primary);
            font-family: 'Outfit', sans-serif;
            color: var(--white);
            overflow-x: hidden;
            -webkit-text-size-adjust: 100%;
        }

        .agenda-page {
            background-color: var(--blue-primary);
            position: relative;
            padding: 2rem 1.5rem 3rem;
            overflow: hidden;
        }

        .px-block {
            position: absolute;
            background-color: var(--green-accent);
            border-radius: 3px;
            opacity: 0.12;
            pointer-events: none;
        }

        .agenda-inner {
            max-width: 1100px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* ═══════════════════════════════════════════════════
           SESSIONIZE BASE OVERRIDES
        ═══════════════════════════════════════════════════ */

        .sz-root, div.sz-root {
            font-family: 'Outfit', sans-serif !important;
            background-color: transparent !important;
            color: var(--white) !important;
            width: 100% !important;
            max-width: 100% !important;
        }

        /* Day heading */
        .sz-root .sz-day--header,
        .sz-root h2,
        .sz-root h3 {
            font-family: 'Outfit', sans-serif !important;
            font-weight: 800 !important;
            font-size: 1.4rem !important;
            color: var(--white) !important;
            text-align: center !important;
            padding: 0.25rem 0 1.5rem !important;
            background: transparent !important;
            border: none !important;
            letter-spacing: 0.04em !important;
            text-transform: uppercase !important;
        }

        /* ═══════════════════════════════════════════════════
           TABLE — DESKTOP GRID (≥ 769px)
        ═══════════════════════════════════════════════════ */
        .sz-root table {
            width: 100% !important;
            border-collapse: separate !important;
            border-spacing: 5px !important;
            background: transparent !important;
            table-layout: fixed !important;
        }

        .sz-root table th,
        .sz-root th,
        .sz-root .sz-room--header {
            font-family: 'Outfit', sans-serif !important;
            background-color: var(--blue-dark) !important;
            color: var(--green-accent) !important;
            font-weight: 700 !important;
            font-size: 0.72rem !important;
            letter-spacing: 0.1em !important;
            text-transform: uppercase !important;
            border: 1px solid rgba(28, 233, 182, 0.3) !important;
            border-radius: 6px !important;
            padding: 0.7rem 0.8rem !important;
            text-align: center !important;
            vertical-align: middle !important;
            word-break: break-word !important;
        }

        .sz-root table td,
        .sz-root td {
            background-color: transparent !important;
            border: none !important;
            padding: 3px !important;
            vertical-align: top !important;
            font-family: 'Outfit', sans-serif !important;
        }

        /* Time column */
        .sz-root td:first-child,
        .sz-root .sz-timeslot {
            color: var(--green-accent) !important;
            font-weight: 700 !important;
            font-size: 0.8rem !important;
            font-family: 'Outfit', sans-serif !important;
            white-space: nowrap !important;
            background-color: transparent !important;
            border: none !important;
            padding-right: 8px !important;
            vertical-align: top !important;
            width: 52px !important;
            min-width: 52px !important;
            max-width: 52px !important;
        }

        /* ═══════════════════════════════════════════════════
           SESSION CARD
        ═══════════════════════════════════════════════════ */
        .sz-root .sz-session,
        div.sz-root div.sz-session,
        .sz-root .sz-session[class],
        .sz-root td .sz-session {
            background-color: var(--blue-card) !important;
            background: var(--blue-card) !important;
            border-radius: 8px !important;
            border: none !important;
            border-left: 4px solid var(--green-accent) !important;
            padding: 0.75rem 0.9rem !important;
            color: var(--white) !important;
            font-family: 'Outfit', sans-serif !important;
            display: block !important;
            height: 100% !important;
            transition: background-color 0.18s ease !important;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2) !important;
            outline: none !important;
            overflow: hidden !important;
        }

        .sz-root .sz-session:hover,
        div.sz-root div.sz-session:hover {
            background-color: var(--blue-accent) !important;
            background: var(--blue-accent) !important;
        }

        /* Service sessions */
        .sz-root .sz-session.sz-session--service,
        div.sz-root div.sz-session.sz-session--service {
            background-color: var(--blue-service) !important;
            background: var(--blue-service) !important;
            border-left: 4px solid var(--green-accent) !important;
            text-align: center !important;
        }

        /* Session title */
        .sz-root .sz-session .sz-session--title,
        .sz-root .sz-session .sz-session--title a,
        .sz-root .sz-session--title,
        .sz-root .sz-session--title a,
        div.sz-root .sz-session--title,
        div.sz-root .sz-session--title a {
            font-family: 'Outfit', sans-serif !important;
            font-weight: 600 !important;
            font-size: 0.9rem !important;
            line-height: 1.4 !important;
            color: var(--white) !important;
            text-decoration: none !important;
            display: block !important;
            margin: 0 0 0.2rem 0 !important;
            background: transparent !important;
            word-break: break-word !important;
            overflow-wrap: break-word !important;
        }

        /* Service title */
        .sz-root .sz-session.sz-session--service .sz-session--title,
        .sz-root .sz-session.sz-session--service .sz-session--title a {
            color: var(--green-accent) !important;
            font-weight: 700 !important;
            font-size: 1rem !important;
        }

        /* Room badge */
        .sz-root .sz-session .sz-session--room,
        .sz-root .sz-session--room,
        div.sz-root .sz-session--room {
            display: inline-block !important;
            font-family: 'Outfit', sans-serif !important;
            font-size: 0.58rem !important;
            font-weight: 700 !important;
            letter-spacing: 0.09em !important;
            text-transform: uppercase !important;
            background-color: var(--green-accent) !important;
            background: var(--green-accent) !important;
            color: var(--blue-dark) !important;
            border-radius: 3px !important;
            padding: 0.12rem 0.45rem !important;
            margin-bottom: 0.35rem !important;
            border: none !important;
            white-space: normal !important;
            word-break: break-word !important;
            max-width: 100% !important;
        }

        /* Time badge inside card */
        .sz-root .sz-session .sz-session--time,
        .sz-root .sz-session--time {
            font-family: 'Outfit', sans-serif !important;
            font-size: 0.68rem !important;
            font-weight: 400 !important;
            color: var(--green-light) !important;
            display: block !important;
            margin-bottom: 0.15rem !important;
            background: transparent !important;
        }

        /* Speaker names */
        .sz-root .sz-session .sz-session--speakers,
        .sz-root .sz-session .sz-session--speakers a,
        .sz-root .sz-session .sz-session--speakers span,
        .sz-root .sz-session--speakers,
        .sz-root .sz-session--speakers a {
            font-family: 'Outfit', sans-serif !important;
            font-size: 0.8rem !important;
            font-weight: 400 !important;
            color: var(--green-light) !important;
            text-decoration: none !important;
            display: block !important;
            background: transparent !important;
            margin-top: 0.3rem !important;
            word-break: break-word !important;
        }

        /* Description */
        .sz-root .sz-session .sz-session--description,
        .sz-root .sz-session--description {
            font-family: 'Outfit', sans-serif !important;
            font-size: 0.78rem !important;
            font-weight: 300 !important;
            line-height: 1.5 !important;
            color: rgba(255,255,255,0.7) !important;
            margin-top: 0.2rem !important;
            background: transparent !important;
        }

        /* Speaker photo */
        .sz-root .sz-speaker--photo,
        .sz-root .sz-avatar {
            border: 2px solid var(--green-accent) !important;
            border-radius: 50% !important;
        }

        /* Powered by */
        .sz-root .sz-powered-by,
        .sz-root a[href*="sessionize"] {
            font-family: 'Outfit', sans-serif !important;
            font-size: 0.65rem !important;
            color: rgba(122, 240, 212, 0.4) !important;
            text-align: center !important;
            display: block !important;
            margin-top: 2rem !important;
        }

        /* All links */
        .sz-root a {
            color: var(--green-accent) !important;
            text-decoration: none !important;
        }
        .sz-root a:hover { color: var(--green-light) !important; }

        /* Spinner */
        .sz-spinner {
            border-top-color: var(--green-accent) !important;
            margin: 80px auto !important;
        }

        /* ═══════════════════════════════════════════════════
           MOBILE OVERRIDES — ≤ 768px
           Fuerza layout de lista vertical, elimina el grid
           de columnas que Sessionize usa en desktop.
        ═══════════════════════════════════════════════════ */
        @media (max-width: 768px) {
            .agenda-page {
                padding: 1rem 0.75rem 2rem;
            }

            /* Ocultar deco lateral en mobile para no confundir */
            .px-block { display: none; }

            /* ── Tabla: convertir en bloques verticales ── */
            .sz-root table,
            .sz-root table thead,
            .sz-root table tbody,
            .sz-root table tr,
            .sz-root table td,
            .sz-root table th {
                display: block !important;
                width: 100% !important;
                max-width: 100% !important;
                border-spacing: 0 !important;
                padding: 0 !important;
            }

            /* Ocultar fila de headers de columna (nombres de salas en th) */
            .sz-root table thead,
            .sz-root table tr:first-child th,
            .sz-root thead tr {
                display: none !important;
            }

            /* Cada fila de tiempo = sección */
            .sz-root table tr {
                margin-bottom: 0 !important;
            }

            /* Celda de tiempo: mostrar como etiqueta de hora */
            .sz-root td:first-child,
            .sz-root .sz-timeslot {
                width: 100% !important;
                min-width: 0 !important;
                max-width: 100% !important;
                display: block !important;
                padding: 0.6rem 0 0.3rem !important;
                font-size: 0.75rem !important;
                font-weight: 700 !important;
                color: var(--green-accent) !important;
                letter-spacing: 0.08em !important;
                border-top: 1px solid rgba(28,233,182,0.18) !important;
                margin-top: 0.5rem !important;
            }

            /* Celdas de sesiones */
            .sz-root table td {
                padding: 0 0 6px 0 !important;
                width: 100% !important;
            }

            /* Cards full-width en mobile */
            .sz-root .sz-session,
            div.sz-root div.sz-session {
                border-radius: 10px !important;
                padding: 0.85rem 1rem !important;
                margin-bottom: 0 !important;
                border-left: 4px solid var(--green-accent) !important;
                box-shadow: 0 3px 12px rgba(0,0,0,0.25) !important;
            }

            /* Mostrar la sala como badge dentro del card */
            .sz-root .sz-session .sz-session--room,
            .sz-root .sz-session--room {
                font-size: 0.6rem !important;
                padding: 0.15rem 0.5rem !important;
                margin-bottom: 0.4rem !important;
                display: inline-block !important;
            }

            /* Título más grande y legible en mobile */
            .sz-root .sz-session .sz-session--title,
            .sz-root .sz-session .sz-session--title a,
            .sz-root .sz-session--title,
            .sz-root .sz-session--title a {
                font-size: 0.95rem !important;
                line-height: 1.35 !important;
                font-weight: 700 !important;
            }

            /* Service title */
            .sz-root .sz-session.sz-session--service .sz-session--title,
            .sz-root .sz-session.sz-session--service .sz-session--title a {
                font-size: 1rem !important;
            }

            /* Speaker */
            .sz-root .sz-session .sz-session--speakers,
            .sz-root .sz-session .sz-session--speakers a {
                font-size: 0.82rem !important;
                color: var(--green-light) !important;
                margin-top: 0.35rem !important;
            }

            /* Time badge */
            .sz-root .sz-session .sz-session--time,
            .sz-root .sz-session--time {
                font-size: 0.7rem !important;
            }

            /* Day heading */
            .sz-root .sz-day--header,
            .sz-root h2 {
                font-size: 1.1rem !important;
                padding: 0 0 1rem !important;
                letter-spacing: 0.06em !important;
            }

            /* Ocultar la columna del tiempo si Sessionize la repite */
            .sz-root .sz-timeslot--empty {
                display: none !important;
            }
        }

        /* ── Very small screens ── */
        @media (max-width: 380px) {
            .sz-root .sz-session .sz-session--title,
            .sz-root .sz-session .sz-session--title a,
            .sz-root .sz-session--title,
            .sz-root .sz-session--title a {
                font-size: 0.88rem !important;
            }
            .sz-root .sz-session,
            div.sz-root div.sz-session {
                padding: 0.7rem 0.85rem !important;
            }
        }

        /* ── Tablets ── */
        @media (min-width: 769px) and (max-width: 1024px) {
            .sz-root table th { font-size: 0.65rem !important; padding: 0.5rem 0.4rem !important; }
            .sz-root .sz-session .sz-session--title,
            .sz-root .sz-session--title a { font-size: 0.82rem !important; }
            .sz-root .sz-session { padding: 0.6rem 0.7rem !important; }
        }
    </style>
</head>
<body>
<div class="agenda-page">

    <!-- Pixel deco — only visible on desktop -->
    <div class="px-block" style="top:14px;left:14px;width:32px;height:32px;"></div>
    <div class="px-block" style="top:52px;left:14px;width:22px;height:22px;"></div>
    <div class="px-block" style="top:14px;left:52px;width:32px;height:32px;"></div>
    <div class="px-block" style="top:52px;left:52px;width:14px;height:14px;opacity:0.06;"></div>
    <div class="px-block" style="top:14px;right:14px;width:22px;height:22px;"></div>
    <div class="px-block" style="top:42px;right:14px;width:32px;height:32px;"></div>
    <div class="px-block" style="top:14px;right:42px;width:22px;height:22px;"></div>
    <div class="px-block" style="top:80px;right:14px;width:14px;height:14px;opacity:0.06;"></div>
    <div class="px-block" style="bottom:14px;right:14px;width:32px;height:32px;"></div>
    <div class="px-block" style="bottom:52px;right:14px;width:22px;height:22px;"></div>
    <div class="px-block" style="bottom:14px;right:52px;width:22px;height:22px;"></div>
    <div class="px-block" style="bottom:14px;left:14px;width:22px;height:22px;"></div>
    <div class="px-block" style="bottom:42px;left:14px;width:14px;height:14px;"></div>
    <div class="px-block" style="bottom:14px;left:38px;width:14px;height:14px;"></div>

    <div class="agenda-inner">
        <script type="text/javascript"
                src="https://sessionize.com/api/v2/6gpc0cd3/view/GridSmart"></script>
    </div>

    <script>
        var lastH = 0;
        var observer = null;

        function getFullHeight() {
            // scrollHeight da la altura TOTAL del contenido, incluso lo no visible
            var body = document.body;
            var html = document.documentElement;
            return Math.max(
                body.scrollHeight,
                body.offsetHeight,
                html.scrollHeight,
                html.offsetHeight
            ) + 32; // margen de seguridad
        }

        function sendHeight() {
            var h = getFullHeight();
            if (h > 200 && h !== lastH) {
                lastH = h;
                if (window.parent !== window) {
                    window.parent.postMessage({ agendaHeight: h }, '*');
                }
            }
        }

        // Disparar en múltiples momentos — Sessionize puede tardar hasta 10s en mobile
        var intervals = [100, 300, 700, 1500, 3000, 5000, 8000, 12000, 16000];
        intervals.forEach(function(ms) {
            setTimeout(sendHeight, ms);
        });

        window.addEventListener('load', function() {
            sendHeight();
            // Seguir intentando cada 2s hasta que el contenido sea estable
            var attempts = 0;
            var poller = setInterval(function() {
                sendHeight();
                attempts++;
                if (attempts >= 15) clearInterval(poller);
            }, 2000);
        });

        // ResizeObserver — más confiable que MutationObserver para cambios de tamaño
        if (window.ResizeObserver) {
            var ro = new ResizeObserver(function() {
                setTimeout(sendHeight, 100);
            });
            ro.observe(document.body);
        }

        // MutationObserver como fallback
        var mo = new MutationObserver(function() {
            setTimeout(sendHeight, 300);
        });
        mo.observe(document.body, { childList: true, subtree: true, attributes: true });
    </script>
</div>
</body>
</html>
